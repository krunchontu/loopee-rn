# Maestro E2E Testing Configuration
# https://maestro.mobile.dev/

# App Configuration
appId: com.loopee.app

# Flow defaults
flows:
  - flows/

# Environment
# Test credentials must be provided via shell environment variables:
#   export TEST_EMAIL="your-test@example.com"
#   export TEST_PASSWORD="your-test-password"
# Or create .maestro/config.local.yaml (git-ignored) with:
#   env:
#     TEST_EMAIL: your-test@example.com
#     TEST_PASSWORD: your-test-password
env: {}

# Execution settings
executionOrder:
  continueOnFailure: false
  flowsOrder:
    - flows/01-app-launch.yaml
    - flows/02-auth-login.yaml
    - flows/03-map-discovery.yaml
    - flows/04-toilet-details.yaml
    - flows/05-contribute-toilet.yaml
    - flows/06-user-profile.yaml
