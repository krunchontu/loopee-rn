name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --legacy-peer-deps
      # Start strict — ratchet --max-warnings down as warnings are fixed
      - run: npx eslint . --max-warnings=1000

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    # 19 pre-existing type errors — remove continue-on-error once fixed
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --legacy-peer-deps
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --legacy-peer-deps
      - run: npx jest --ci --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  secrets-check:
    name: No Secrets in Repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject tracked env files
        run: |
          if git ls-files | grep -E '^\.?env\.local$'; then
            echo "::error::Secret env file is tracked in git. Remove it immediately."
            exit 1
          fi
      - name: Check for hardcoded Supabase keys
        run: |
          if grep -rn 'eyJhbGciOi' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' .; then
            echo "::error::Possible hardcoded JWT/API key found in source files."
            exit 1
          fi
